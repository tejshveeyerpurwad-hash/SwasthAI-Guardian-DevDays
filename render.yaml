services:
  - type: web
    name: swasthai-guardian
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: .
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard for security
